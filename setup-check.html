<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فحص إعداد MC Control Cloud</title><style>body{margin:0;background:#070b12;color:#eef4ff;font-family:Tahoma,Arial;padding:30px}.box{max-width:760px;margin:auto;background:#101827;border:1px solid #26354d;border-radius:18px;padding:24px}h1{margin-top:0}label{display:block;color:#96a5bb;margin:15px 0 7px}input{width:100%;box-sizing:border-box;background:#080d16;border:1px solid #2b3a52;color:#fff;border-radius:10px;padding:12px;direction:ltr}button{margin-top:15px;border:0;border-radius:10px;padding:11px 17px;background:#20b66b;color:white;font-weight:bold;cursor:pointer}.secondary{background:#1b293d}.result{margin-top:18px;padding:14px;border-radius:10px;background:#080d16;white-space:pre-wrap;direction:ltr;text-align:left}.ok{color:#66e79c}.bad{color:#ff7888}.warn{color:#f6c96f}</style></head><body><div class="box"><h1>🧪 فحص إعداد الحسابات</h1><p>هذه الصفحة للمالك فقط. لا تستخدم Service Role Key هنا.</p><label>Supabase Project URL</label><input id="url" placeholder="https://project.supabase.co"><label>Publishable / anon key</label><input id="key" placeholder="sb_publishable_... أو eyJ..."><button id="test">اختبار الاتصال</button> <button id="download" class="secondary">تنزيل config.js</button><div id="result" class="result">أدخل القيمتين ثم اضغط اختبار.</div></div><script>const $=s=>document.querySelector(s);function configText(){return `window.MC_CLOUD_CONFIG = {\n  supabaseUrl: ${JSON.stringify($('#url').value.trim())},\n  supabaseAnonKey: ${JSON.stringify($('#key').value.trim())}\n};\n`}$('#test').onclick=async()=>{const u=$('#url').value.trim().replace(/\/$/,''),k=$('#key').value.trim(),r=$('#result');if(!/^https:\/\/.+\.supabase\.co$/.test(u)||k.length<20){r.className='result bad';r.textContent='القيم غير صحيحة أو ناقصة.';return}r.className='result warn';r.textContent='جارٍ الاختبار...';try{const x=await fetch(u+'/auth/v1/health',{headers:{apikey:k}});if(!x.ok)throw new Error('HTTP '+x.status+' '+await x.text());r.className='result ok';r.textContent='✅ الاتصال بخدمة Supabase Auth ناجح.\n\nالخطوة التالية: نزّل config.js وارفعه إلى جذر مستودع GitHub، ثم شغّل schema.sql.'}catch(e){r.className='result bad';r.textContent='❌ فشل الاتصال: '+e.message}};$('#download').onclick=()=>{const b=new Blob([configText()],{type:'text/javascript'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='config.js';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),300)}</script></body></html>
