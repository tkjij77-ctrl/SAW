name: Build Frontend v2

on:
  push:
    branches: [master, main]
    paths:
      - "frontend-v2/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json
      - name: Install
        working-directory: frontend-v2
        run: npm ci
      - name: Verify, typecheck and build
        working-directory: frontend-v2
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: https://tkjij77-ctrl.github.io/SAW/
        run: npm run build:ci
      - uses: actions/upload-artifact@v4
        with:
          name: saw-frontend-v2-dist
          path: frontend-v2/dist
